name: news_app
description: "A modern, minimalist news application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  provider: ^6.1.1
  intl: ^0.20.2
  image_picker: ^1.0.5
  google_fonts: ^8.0.2
  timeago: ^3.7.1
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  flutter_tts: ^4.2.5
  sensors_plus: ^7.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/foreground_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#050914"
    theme_color: "#050914"
